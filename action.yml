name: "Unique SSH Deployer"
description: "Fast SSH/SFTP file deployment with smart sync for changed files and post-deploy support."
author: "Tecbeckp"

branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  host:
    description: "SSH server hostname or IP address"
    required: true
  port:
    description: "SSH port"
    required: false
    default: "22"
  username:
    description: "SSH username"
    required: true
  private-key:
    description: "SSH private key (full content, not path). Use GitHub Secrets!"
    required: true
  passphrase:
    description: "Passphrase for the SSH private key (if encrypted)"
    required: false
    default: ""
  local-dir:
    description: "Local folder to deploy. Must end with trailing slash."
    required: false
    default: "./"
  server-dir:
    description: "Remote folder to deploy to. Must end with trailing slash."
    required: false
    default: "./"
  state-name:
    description: "Name of the sync state file stored on the server to track deployments."
    required: false
    default: ".ssh-deploy-sync-state.json"
  dry-run:
    description: "Preview changes without actually deploying (true/false)"
    required: false
    default: "false"
  dangerous-clean-slate:
    description: "Delete ALL existing files on the server before deploying (true/false)"
    required: false
    default: "false"
  exclude:
    description: "Glob patterns to exclude from deployment (one per line, or comma-separated). .git and node_modules are always excluded."
    required: false
    default: |
      **/.git*
      **/.git*/**
      **/node_modules/**
  log-level:
    description: "Logging verbosity: minimal, standard, or verbose"
    required: false
    default: "standard"
  timeout:
    description: "Connection/operation timeout in milliseconds"
    required: false
    default: "30000"

  # ── Pre-Deploy Commands ──
  pre-commands:
    description: "Commands to run on server BEFORE file sync (one per line). Use for maintenance mode, backups, etc."
    required: false
    default: ""

  # ── Post-Deploy Commands ──
  commands:
    description: "Commands to run on the server AFTER file sync (one per line). Lines starting with # are ignored."
    required: false
    default: ""
  commands-working-dir:
    description: "Working directory for remote commands. Defaults to server-dir."
    required: false
    default: ""

  # ── Rollback ──
  rollback-on-failure:
    description: "Rollback deployment if health check fails (true/false). Requires health-check-url and health-check-fail-deploy."
    required: false
    default: "false"
  rollback-limit:
    description: "Maximum rollback states to keep on server"
    required: false
    default: "3"

  # ── Health Check ──
  health-check-url:
    description: "URL to check after deployment (e.g., https://example.com/health). Leave empty to skip."
    required: false
    default: ""
  health-check-status:
    description: "Expected HTTP status code for health check"
    required: false
    default: "200"
  health-check-retries:
    description: "Number of health check retry attempts"
    required: false
    default: "3"
  health-check-retry-delay:
    description: "Delay between health check retries in milliseconds"
    required: false
    default: "5000"
  health-check-fail-deploy:
    description: "Fail the entire deployment if health check fails (true/false)"
    required: false
    default: "false"

  # ── Notifications ──
  webhook-url:
    description: "Webhook URL for deployment notifications (Slack, Discord, or custom). Leave empty to skip."
    required: false
    default: ""
  webhook-type:
    description: "Webhook provider: slack, discord, or custom"
    required: false
    default: "slack"

  # ── Environment ──
  environment:
    description: "Environment name (e.g., production, staging, development). Used in notifications and state tracking."
    required: false
    default: "production"

outputs:
  files-uploaded:
    description: "Number of new files uploaded"
  files-replaced:
    description: "Number of modified files replaced"
  files-deleted:
    description: "Number of deleted files removed from server"
  files-unchanged:
    description: "Number of unchanged files"
  bytes-transferred:
    description: "Total bytes transferred"
  duration-ms:
    description: "Total deployment duration in milliseconds"
  total-changes:
    description: "Total number of files changed (uploaded + replaced + deleted)"
  rolled-back:
    description: "Whether the deployment was rolled back (true/false)"
  health-check-passed:
    description: "Whether the health check passed (true/false/N/A)"
  notification-sent:
    description: "Whether the notification was sent successfully (true/false)"
  environment:
    description: "Environment name that was deployed to"

runs:
  using: "node20"
  main: "dist/index.js"
