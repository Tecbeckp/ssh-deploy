# ============================================================
#  Laravel / PHP deployment with all CI/CD features
#  Place this file at: .github/workflows/deploy.yml
# ============================================================

name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Laravel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: Tecbeckp/ssh-deploy@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          server-dir: /var/www/html/my-laravel-app/
          environment: production
          exclude: |
            **/.git*
            **/node_modules/**
            **/vendor/**
            **/.env
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
          pre-commands: |
            # Enable maintenance mode before deploying
            php artisan down --secret="deploy-bypass-token"
            # Create backup
            mysqldump -u root mydb > /backups/db-$(date +%Y%m%d-%H%M%S).sql || true
          commands: |
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
            # Disable maintenance mode
            php artisan up
            sudo systemctl reload php8.3-fpm
          rollback-on-failure: true
          health-check-url: https://example.com/health
          health-check-status: 200
          health-check-retries: 5
          health-check-retry-delay: 3000
          health-check-fail-deploy: true
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: slack
