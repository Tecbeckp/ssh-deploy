# ============================================================
#  Basic deployment workflow
#  Place this file at: .github/workflows/deploy.yml
# ============================================================

name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: Tecbeckp/ssh-deploy@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          server-dir: /var/www/html/my-app/

# ============================================================
#  REQUIRED SECRETS (GitHub repo -> Settings -> Secrets):
#
#    SSH_HOST          Your server IP or hostname
#    SSH_USERNAME      SSH user (e.g., root, deploy, ubuntu)
#    SSH_PRIVATE_KEY   Full SSH private key content
#                      Generate with: ssh-keygen -t ed25519
#
#  OPTIONAL SECRETS:
#    SSH_PORT           SSH port (default: 22)
#    SSH_PASSPHRASE     If your key is encrypted
#    SLACK_WEBHOOK_URL  For Slack notifications
#    DISCORD_WEBHOOK_URL For Discord notifications
# ============================================================
