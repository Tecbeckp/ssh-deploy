# ============================================================
#  Advanced deployment with all features
#  Place this file at: .github/workflows/deploy.yml
# ============================================================

name: Build & Deploy via SSH

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Staging
        uses: Tecbeckp/ssh-deploy@v1
        id: deploy
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USERNAME }}
          private-key: ${{ secrets.STAGING_SSH_KEY }}
          local-dir: build/
          server-dir: /var/www/staging/
          environment: staging
          log-level: verbose
          exclude: |
            **/.git*
            **/node_modules/**
            **/*.map
          pre-commands: |
            echo "Starting staging deployment..."
          commands: |
            pm2 restart staging-app || true
          health-check-url: https://staging.example.com/health
          health-check-retries: 3
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: slack

      - name: Summary
        run: |
          echo "Files: ${{ steps.deploy.outputs.total-changes }} changed"
          echo "Health: ${{ steps.deploy.outputs.health-check-passed }}"

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval if configured

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Production
        uses: Tecbeckp/ssh-deploy@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USERNAME }}
          private-key: ${{ secrets.PROD_SSH_KEY }}
          local-dir: build/
          server-dir: /var/www/production/
          environment: production
          log-level: standard
          exclude: |
            **/.git*
            **/node_modules/**
            **/*.map
            **/*.test.js
          pre-commands: |
            # Backup current deployment
            tar -czf /backups/prod-$(date +%Y%m%d-%H%M%S).tar.gz /var/www/production/ || true
          commands: |
            pm2 restart production-app
          rollback-on-failure: true
          health-check-url: https://example.com/health
          health-check-retries: 5
          health-check-retry-delay: 3000
          health-check-fail-deploy: true
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: slack
